# Dependabot keeps dependencies patched. It opens PRs for security fixes and
# (weekly) for routine version bumps across all three ecosystems this repo uses:
# the frontend (npm/Bun), the Rust backend (Cargo), and the CI itself (the
# actions pinned in .github/workflows). Grouping keeps the PR noise low — one PR
# per ecosystem per week instead of a flood.
version: 2
updates:
  # Frontend deps. Bun reads package.json, so the npm ecosystem covers it.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # Rust backend (src-tauri/Cargo.toml + Cargo.lock).
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-dependencies:
        patterns:
          - "*"

  # The CI workflow actions themselves (checkout, setup-bun, tauri-action, …).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-dependencies:
        patterns:
          - "*"
